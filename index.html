<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Road2Million — Suivi financier</title>
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg%20xmlns="http://www.w3.org/2000/svg"%20viewBox="0%200%2064%2064"%3E%3Cdefs%3E%3ClinearGradient%20id="g"%20x1="0"%20y1="0"%20x2="0"%20y2="1"%3E%3Cstop%20offset="0"%20stop-color="%230f172a"/%3E%3Cstop%20offset="1"%20stop-color="%231e3a8a"/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width="64"%20height="64"%20rx="14"%20fill="url(%23g)"/%3E%3Ctext%20x="32"%20y="43"%20text-anchor="middle"%20font-family="Inter,system-ui,Helvetica,Arial,sans-serif"%20font-size="26"%20font-weight="800"%20fill="%23fbbf24"%20letter-spacing="-1"%3ER2M%3C/text%3E%3C/svg%3E'>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f8fa;
    --surface:#ffffff;
    --surface-2:#f3f4f7;
    --border:#e7e9ee;
    --border-soft:#eef0f4;
    --text:#0b1220;
    --text-2:#1f2937;
    --muted:#6b7280;
    --faint:#9ca3af;
    --accent:#2563eb;
    --accent-soft:#eff4ff;
    --accent-strong:#1d4ed8;
    --success:#059669;
    --success-soft:#ecfdf5;
    --danger:#dc2626;
    --danger-soft:#fef2f2;
    --warn:#d97706;
    --warn-soft:#fffbeb;
    --purple:#7c3aed;
    --purple-soft:#f5f3ff;
    --radius:12px;
    --radius-sm:8px;
    --shadow-sm:0 1px 2px rgba(16,24,40,.04), 0 1px 3px rgba(16,24,40,.06);
    --shadow:0 4px 12px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.04);
    --shadow-lg:0 12px 32px rgba(16,24,40,.08), 0 2px 6px rgba(16,24,40,.04);
    --sidebar-w:232px;
    --header-h:60px;
  }
  [data-theme="dark"]{
    --bg:#0a0d14; --surface:#10141d; --surface-2:#171c27; --border:#232939; --border-soft:#1a1f2c;
    --text:#e8ecf3; --text-2:#cdd3de; --muted:#7c8599; --faint:#52596a;
    --accent:#60a5fa; --accent-soft:rgba(96,165,250,.12); --accent-strong:#3b82f6;
    --success:#34d399; --success-soft:rgba(52,211,153,.12);
    --danger:#f87171; --danger-soft:rgba(248,113,113,.12);
    --warn:#fbbf24; --warn-soft:rgba(251,191,36,.12);
    --purple:#a78bfa; --purple-soft:rgba(167,139,250,.12);
    --shadow-sm:0 1px 2px rgba(0,0,0,.35);
    --shadow:0 4px 12px rgba(0,0,0,.4);
    --shadow-lg:0 12px 32px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  .mono{font-family:'JetBrains Mono','SF Mono',monospace;font-variant-numeric:tabular-nums}
  .num{font-variant-numeric:tabular-nums}
  button{font:inherit;color:inherit;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;cursor:pointer;transition:all .15s ease;display:inline-flex;align-items:center;gap:6px;font-weight:500}
  button:hover{background:var(--surface-2);border-color:var(--muted)}
  button.primary{background:var(--accent);border-color:var(--accent);color:white}
  button.primary:hover{background:var(--accent-strong);border-color:var(--accent-strong)}
  button.ghost{border:1px solid transparent}
  button.ghost:hover{background:var(--surface-2);border-color:var(--border)}
  button.danger{color:var(--danger);border-color:transparent}
  button.danger:hover{background:var(--danger-soft);border-color:var(--danger-soft)}
  button.icon{padding:8px;width:36px;height:36px;justify-content:center}
  button.sm{padding:4px 8px;font-size:12px}
  input,select,textarea{font:inherit;color:var(--text);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;outline:none;width:100%;transition:border-color .15s ease,box-shadow .15s ease}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  input[type="number"]{text-align:right;font-variant-numeric:tabular-nums}
  input[type="checkbox"]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  textarea{resize:vertical;min-height:80px}

  /* LAYOUT */
  .app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh}
  aside{background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
  .brand{display:flex;align-items:center;gap:10px;padding:10px 12px 16px}
  .brand-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--purple));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;box-shadow:var(--shadow-sm)}
  .brand-name{font-weight:600;font-size:15px;letter-spacing:-.01em}
  .brand-sub{font-size:11px;color:var(--muted)}
  .nav-title{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600;padding:14px 12px 6px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-2);font-weight:500;font-size:13.5px;border:1px solid transparent;user-select:none}
  .nav-item:hover{background:var(--surface-2)}
  .nav-item.active{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .nav-item.active svg{color:var(--accent)}
  .nav-item svg{flex-shrink:0;color:var(--muted)}
  .nav-spacer{flex:1}
  .nav-footer{padding:8px 12px;font-size:11px;color:var(--faint);border-top:1px solid var(--border);margin-top:8px}

  main{min-width:0}
  header.topbar{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20;backdrop-filter:saturate(180%) blur(8px)}
  .topbar h1{font-size:16px;margin:0;font-weight:600;letter-spacing:-.01em}
  .crumb{color:var(--muted);font-size:13px}
  .topbar .sep{flex:1}
  .year-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface-2);border:1px solid var(--border);border-radius:999px;font-size:13px;font-weight:500}
  .year-pill select{background:transparent;border:none;padding:0;font-weight:600;cursor:pointer;width:auto;padding-right:4px}
  .year-pill select:focus{box-shadow:none}

  .content{padding:24px;max-width:1400px;margin:0 auto}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px}
  .section-head h2{font-size:20px;font-weight:600;margin:0;letter-spacing:-.015em}
  .section-head .sub{color:var(--muted);font-size:13px}

  /* CARDS */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
  .card-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.005em;margin:0}
  .card-sub{font-size:12px;color:var(--muted)}

  /* KPI */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .kpi .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .kpi .label{font-size:12px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em}
  .kpi .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);color:var(--accent)}
  .kpi .value{font-size:26px;font-weight:600;letter-spacing:-.02em;line-height:1.1;margin-bottom:4px;font-variant-numeric:tabular-nums}
  .kpi .sub{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .kpi .chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:11px;font-weight:600}
  .kpi .chip.up{background:var(--success-soft);color:var(--success)}
  .kpi .chip.down{background:var(--danger-soft);color:var(--danger)}
  .kpi .chip.neutral{background:var(--surface-2);color:var(--muted)}
  .kpi.success .icon{background:var(--success-soft);color:var(--success)}
  .kpi.danger .icon{background:var(--danger-soft);color:var(--danger)}
  .kpi.warn .icon{background:var(--warn-soft);color:var(--warn)}
  .kpi.purple .icon{background:var(--purple-soft);color:var(--purple)}

  /* TABLES */
  .table-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:auto;background:var(--surface)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--border-soft)}
  th:first-child,td:first-child{text-align:left}
  tr:last-child td{border-bottom:none}
  thead th{font-weight:600;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;background:var(--surface-2);border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1}
  tbody tr{transition:background .1s ease}
  tbody tr td{vertical-align:middle}
  tbody tr:nth-child(even){background:color-mix(in srgb, var(--surface-2) 35%, var(--surface))}
  tbody tr:hover{background:var(--surface-2)}
  tbody tr.total{background:var(--surface-2);font-weight:600}
  tbody tr.total td{border-top:2px solid var(--border)}
  tbody tr.highlight{background:var(--accent-soft)}
  tbody tr.highlight td{color:var(--accent)}
  td input{background:transparent;border:1px solid var(--border-soft);border-radius:6px;padding:5px 8px;font-size:13px;text-align:right;width:100%;box-sizing:border-box;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',ui-monospace,monospace}
  td input:hover{border-color:var(--border);background:var(--surface-2)}
  td input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft);outline:none}
  td input.text-input{text-align:left;font-family:inherit}
  td.num-cell{position:relative}
  td.num-cell::after{content:attr(data-suffix);position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:11px;pointer-events:none;font-family:'JetBrains Mono',ui-monospace,monospace}
  td.num-cell input{padding-right:22px}

  .pos{color:var(--success);font-weight:500}
  .neg{color:var(--danger);font-weight:500}
  .muted{color:var(--muted)}
  .faint{color:var(--faint)}

  /* PROGRESS */
  .bar{height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden}
  .bar > div{height:100%;border-radius:3px;transition:width .3s ease}
  .bar.success > div{background:var(--success)}
  .bar.danger > div{background:var(--danger)}
  .bar.warn > div{background:var(--warn)}
  .bar.default > div{background:var(--accent)}

  /* CHART CARDS */
  .two-col{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:16px}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
  .donut-wrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .donut-wrap .legend{flex:1;min-width:200px;display:flex;flex-direction:column;gap:4px}
  .legend{display:flex;flex-direction:column;gap:4px}
  .legend-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:6px;font-size:13px}
  .legend-item:hover{background:var(--surface-2)}
  .legend-item .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .legend-item .lbl{flex:1;color:var(--text-2);font-weight:500}
  .legend-item .val{color:var(--text);font-size:12.5px}
  .field{display:flex;flex-direction:column;gap:6px;flex:1}
  .field label{font-size:12px;color:var(--muted);font-weight:500}
  tr.expand td{background:var(--bg)!important}
  @media(max-width:960px){.two-col{grid-template-columns:1fr}.split{grid-template-columns:1fr}.app{grid-template-columns:1fr}aside{position:static;height:auto;flex-direction:row;gap:4px;overflow-x:auto;padding:8px}.nav-title,.nav-footer{display:none}.nav-item{flex-shrink:0}.brand{display:none}.nav-spacer{display:none}}

  /* TAG / CHIP */
  .tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:500;background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
  .tag.success{color:var(--success);background:var(--success-soft);border-color:transparent}
  .tag.danger{color:var(--danger);background:var(--danger-soft);border-color:transparent}
  .tag.warn{color:var(--warn);background:var(--warn-soft);border-color:transparent}
  .tag.info{color:var(--accent);background:var(--accent-soft);border-color:transparent}

  /* TOOLBAR */
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
  .toolbar .sep{flex:1}

  /* OBJECTIVE CARD */
  .checklist{display:flex;flex-direction:column;gap:2px}
  .check-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);transition:background .1s ease;border:1px solid transparent}
  .check-row:hover{background:var(--surface-2)}
  .check-row.done .obj-name{text-decoration:line-through;color:var(--muted)}
  .check-row input[type=text]{border:none;background:transparent;padding:4px 0;font-weight:500}
  .check-row input[type=text]:focus{border:none;box-shadow:none;background:transparent}

  /* MISC */
  hr{border:none;border-top:1px solid var(--border);margin:16px 0}
  .flex{display:flex;align-items:center;gap:8px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  .empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
  .sparkline{width:100%;height:24px;display:block}

  /* SCROLLBAR */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:5px}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted)}

  /* FADE IN */
  .fade-in{animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand">
      <div class="brand-logo">M</div>
      <div>
        <div class="brand-name">MMF</div>
        <div class="brand-sub">Suivi financier</div>
      </div>
    </div>
    <div class="nav-title">Vue d'ensemble</div>

    <div class="nav-title">Gestion</div>

    <div class="nav-spacer"></div>
    <div class="nav-footer">Données locales · <span id="lastSave">auto</span></div>
  </aside>
  <main>
    <header class="topbar">
      <div id="crumbs" class="crumb"></div>
      <span class="sep"></span>
      <div class="year-pill">

        <select id="yearSelect"></select>
      </div>
      <button id="btnTheme" class="icon" title="Thème">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button id="btnExport" title="Exporter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export
      </button>
      <button id="btnImport" title="Importer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import
      </button>
      <input type="file" id="fileImport" accept="application/json" style="display:none" />
    </header>
    <div class="content" id="content"></div>
  </main>
</div>

/* -------- STATE -------- */
const STORAGE_KEY = 'mmf.state.v1';

function emptyYear(){
  return {
    categories: DEFAULT_CATEGORIES.map(n=>({name:n, objectif:0, actual:Array(12).fill(null)})),
    salaire: Array(12).fill(null),
    argent_recu: Array(12).fill(null),
    invest: DEFAULT_PLATFORMS.map(n=>({name:n, amounts:Array(12).fill(null)})),
  };
}

function seedState(){
  const s = {
    currentYear: 2026,
    years: {},
    fixed: { abonnements:[], maison:[] },
    allocation: { total:0, items:[] },
    cash: [], debts: [], objectifs: [], notes: ''
  };
  for(const y of [2022,2023,2024,2025,2026]){
    const y0 = SEED.years && SEED.years[y];
    if(y0){
      const base = emptyYear();
      base.categories = y0.categories.map(c=>({name:c.name, objectif:c.objectif||0, actual:c.actual||Array(12).fill(null)}));
      base.salaire = y0.salaire || Array(12).fill(null);
      base.argent_recu = y0.argent_recu || Array(12).fill(null);
      if(y0.invest && y0.invest.length) base.invest = y0.invest.map(p=>({name:p.name, amounts:p.amounts||Array(12).fill(null)}));
      s.years[y] = base;
    } else s.years[y] = emptyYear();
  }
  s.fixed.abonnements = SEED.abonnements || [];
  s.fixed.maison = SEED.maison || [];
  s.cash = SEED.cash || [];
  s.allocation.total = SEED.allocation_total || 0;
  s.allocation.items = SEED.allocation || [];
  s.debts = SEED.debts || [];
  s.objectifs = SEED.objectifs || [];
  s.accounts = (SEED.accounts || []).map(a => ({
    ...a,
    deposits: (a.deposits||[]).slice(),
    snapshots: a.snapshots ? a.snapshots.slice() : (a.current!=null ? [{date:new Date().toISOString().slice(0,10), value:Number(a.current)||0}] : []),
    notes: a.notes||''
  }));
  s.cryptos = (SEED.cryptos || []).map(c => ({...c}));
  s.yann = SEED.yann ? {...SEED.yann, payments: (SEED.yann.payments||[]).slice()} : {total:0, paid:0, remaining:0, payments:[]};
  s.assets = SEED.assets || []; // patrimoine physique custom (voiture, biens, etc.)
  return s;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      // migrations
      if(!s.accounts) s.accounts = (SEED.accounts||[]).map(a=>({...a, deposits:(a.deposits||[]).slice(), snapshots: a.current!=null?[{date:new Date().toISOString().slice(0,10), value:Number(a.current)||0}]:[], notes:''}));
      else s.accounts.forEach(a=>{ if(!a.snapshots) a.snapshots = (a.current!=null?[{date:new Date().toISOString().slice(0,10), value:Number(a.current)||0}]:[]); if(a.notes==null) a.notes=''; });
      if(!s.cryptos) s.cryptos = (SEED.cryptos||[]).map(c=>({...c}));
      if(!s.yann) s.yann = SEED.yann ? {...SEED.yann, payments:(SEED.yann.payments||[]).slice()} : {total:0,paid:0,remaining:0,payments:[]};
      if(!s.assets) s.assets = [];
      // Frais fixes : on resync depuis le SEED quand la version augmente
      if(!s._fixedV || s._fixedV < 2){
        s.fixed = { abonnements:(SEED.abonnements||[]).map(a=>({...a})), maison:(SEED.maison||[]).map(a=>({...a})) };
        s._fixedV = 2;
      }
      // Devises : init taux + currency par compte
      if(!s.fxRates) s.fxRates = {USD: 0.92, AED: 0.25};
      if(s.fxRates.USD==null) s.fxRates.USD = 0.92;
      if(s.fxRates.AED==null) s.fxRates.AED = 0.25;
      (s.accounts||[]).forEach(a=>{ if(!a.currency) a.currency = 'EUR'; });
      // Salaire : ajouter le champ salaire pour chaque année
      if(s.years){
        Object.keys(s.years).forEach(y=>{
          const yr = s.years[y]; if(!yr) return;
          if(!yr.salaire) yr.salaire = Array(12).fill(null);
        });
      }
      // PE cleanup : purge des dépôts fantômes (one-time, force resync depuis SEED)
      if(!s._peCleanV || s._peCleanV < 1){
        const sourcePE = (SEED.accounts||[]).find(a=>a.type==='pe' || a.name==='Private Equity');
        const userPE = (s.accounts||[]).find(a=>a.type==='pe' || a.name==='Private Equity');
        if(sourcePE && userPE){
          userPE.deposits = (sourcePE.deposits||[]).map(d=>({...d}));
          userPE.invested = sourcePE.invested;
          userPE.current = sourcePE.current;
          userPE.pnl = sourcePE.pnl;
          userPE.snapshots = sourcePE.current!=null?[{date:new Date().toISOString().slice(0,10), value:Number(sourcePE.current)||0}]:[];
        }
        s._peCleanV = 1;
      }
      return s;
    }
  }catch(e){}
  return seedState();
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); const el=document.getElementById('lastSave'); if(el) el.textContent = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }

const fmtEUR  = n => (n==null||isNaN(n)) ? '—' : new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
const fmtEUR2 = n => (n==null||isNaN(n)) ? '—' : new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:2}).format(n);

function h(tag, attrs, ...children){
  const el = document.createElementNS(tag==='svg'||['g','path','rect','circle','line','polyline','polygon','text','defs','linearGradient','stop'].includes(tag) ? 'http://www.w3.org/2000/svg' : 'http://www.w3.org/1999/xhtml', tag);
  if(attrs) for(const k in attrs){
    const v = attrs[k]; if(v==null) continue;
    if(k==='class') el.setAttribute('class', v);
    else if(k==='html') el.innerHTML = v;
    else if(k.startsWith('on') && typeof v==='function') el.addEventListener(k.slice(2), v);
    else el.setAttribute(k, v);
  }
  for(const c of children){
    if(c==null||c===false) continue;
    if(Array.isArray(c)){ c.forEach(cc=>el.append(cc==null?document.createTextNode(''):cc.nodeType?cc:document.createTextNode(String(cc)))); continue; }
    el.append(c.nodeType ? c : document.createTextNode(String(c)));
  }
  return el;
}

function evalNum(s){
  if(s==null) return null;
  const str = String(s).replace(/\s/g,'').replace(/,/g,'.').trim();
  if(str==='') return null;
  if(/^-?\d+(\.\d+)?$/.test(str)) return parseFloat(str);
  if(/^[\d.+\-*/()]+$/.test(str)){
    try {
      const r = Function('"use strict";return ('+str+')')();
      if(typeof r==='number' && isFinite(r)) return r;
    } catch(e){}
  }
  return null;
}
function fmtNumDisp(v){
  if(v==null||isNaN(v)) return '';
  return String(Math.round(v*100)/100).replace('.',',');
}
function numInput(value, onChange, opts={}){
  const i = h('input', {type:'text', inputmode:'decimal', placeholder: opts.placeholder||'', title:'Tu peux taper une expression : 120+45+30'});
  i.value = fmtNumDisp(value);
  i.addEventListener('focus', ()=>{ i.select(); });
  i.addEventListener('change', ()=>{
    const raw = i.value;
    if(raw.trim()===''){ i.value=''; onChange(null); saveState(); renderAll(); return; }
    const v = evalNum(raw);
    if(v==null){ i.value = fmtNumDisp(value); return; }
    i.value = fmtNumDisp(v);
    onChange(v); saveState(); renderAll();
  });
  return i;
}
function textInput(value, onChange){
  const i = h('input', {type:'text', class:'text-input'});
  i.value = value||'';
  i.addEventListener('change', ()=>{ onChange(i.value); saveState(); });
  return i;
}

function monthInvest(y){ const d=yearData(y); const t=Array(12).fill(0); d.invest.forEach(p=>p.amounts.forEach((v,i)=>{if(v)t[i]+=v})); return t; }
function monthRecu(y){ return yearData(y).argent_recu.map(v=>Number(v)||0); }
function monthSal(y){ const d=yearData(y); return (d.salaire||Array(12).fill(null)).map(v=>Number(v)||0); }
function monthlyFixed(){ return sum([...state.fixed.abonnements.map(a=>a.amount||0), ...state.fixed.maison.map(a=>a.amount||0)]); }
function yearObjectif(y){ return sum(yearData(y).categories.map(c=>c.objectif||0)); }

/* -------- CHARTS (SVG) -------- */
function barChart(series, labels, opts={}){
  // series: [{name, color, values}]
  const W = opts.width||720, H = opts.height||220;
  const pad = {t:20,r:10,b:28,l:44};
  const iw = W-pad.l-pad.r, ih = H-pad.t-pad.b;
  const all = series.flatMap(s=>s.values).filter(v=>v!=null);
  const max = Math.max(1, ...all.map(Math.abs));
  const nicemax = niceMax(max);
  const n = labels.length;
  const groupW = iw/n;
  const barW = Math.max(4, groupW/series.length - 4);
  const svg = h('svg',{width:'100%',height:H,viewBox:`0 0 ${W} ${H}`,class:'chart'});
  // gridlines
  const ticks = 4;
  for(let i=0;i<=ticks;i++){
    const y = pad.t + ih*(i/ticks);
    const val = nicemax * (1 - i/ticks);
    svg.appendChild(h('line',{x1:pad.l,y1:y,x2:pad.l+iw,y2:y,stroke:'var(--border-soft)','stroke-width':1}));
    svg.appendChild(h('text',{x:pad.l-8,y:y+4,'font-size':10,fill:'var(--muted)','text-anchor':'end'},formatAxis(val)));
  }
  // bars
  series.forEach((s,si)=>{
    s.values.forEach((v,i)=>{
      if(v==null) return;
      const vv = Math.max(0,v);
      const bh = (vv/nicemax)*ih;
      const x = pad.l + i*groupW + si*(barW+4) + (groupW-series.length*(barW+4)+4)/2;
      const y = pad.t + ih - bh;
      const rect = h('rect',{x,y,width:barW,height:Math.max(0,bh),rx:3,fill:s.color||'var(--accent)',opacity:0.9});
      rect.appendChild(h('title',{},`${labels[i]} · ${s.name}: ${fmtEUR(v)}`));
      svg.appendChild(rect);
    });
  });
  // x labels
  labels.forEach((l,i)=>{
    svg.appendChild(h('text',{x:pad.l+i*groupW+groupW/2,y:H-8,'font-size':10,fill:'var(--muted)','text-anchor':'middle'},l));
  });
  return svg;
}
function lineChart(series, labels, opts={}){
  const W = opts.width||720, H = opts.height||220;
  const pad = {t:16,r:10,b:28,l:44};
  const iw = W-pad.l-pad.r, ih = H-pad.t-pad.b;
  const all = series.flatMap(s=>s.values).filter(v=>v!=null);
  const max = Math.max(1, ...all.map(Math.abs));
  const nicemax = niceMax(max);
  const n = labels.length;
  const step = iw/(n-1 || 1);
  const svg = h('svg',{width:'100%',height:H,viewBox:`0 0 ${W} ${H}`});
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const y = pad.t + ih*(i/ticks);
    const val = nicemax * (1 - i/ticks);
    svg.appendChild(h('line',{x1:pad.l,y1:y,x2:pad.l+iw,y2:y,stroke:'var(--border-soft)','stroke-width':1}));
    svg.appendChild(h('text',{x:pad.l-8,y:y+4,'font-size':10,fill:'var(--muted)','text-anchor':'end'},formatAxis(val)));
  }
  series.forEach(s=>{
    const pts = s.values.map((v,i)=> v==null?null:[pad.l+i*step, pad.t+ih-(Math.max(0,v)/nicemax)*ih]).filter(Boolean);
    if(pts.length<2) return;
    const d = pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ');
    svg.appendChild(h('path',{d,fill:'none',stroke:s.color||'var(--accent)','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}));
    // area
    if(opts.area){
      const d2 = d + ` L${pts[pts.length-1][0]},${pad.t+ih} L${pts[0][0]},${pad.t+ih} Z`;
      svg.appendChild(h('path',{d:d2,fill:s.color||'var(--accent)',opacity:0.08}));
    }
    // dots
    pts.forEach(p=>svg.appendChild(h('circle',{cx:p[0],cy:p[1],r:3,fill:s.color||'var(--accent)'})));
  });
  labels.forEach((l,i)=>{
    svg.appendChild(h('text',{x:pad.l+i*step,y:H-8,'font-size':10,fill:'var(--muted)','text-anchor':'middle'},l));
  });
  return svg;
}
function donutChart(items, opts={}){
  // items: [{label, value, color}]
  const size = opts.size||200;
  const thickness = opts.thickness||28;
  const r = size/2 - 4;
  const r2 = r - thickness;
  const total = sum(items.map(i=>i.value||0));
  const svg = h('svg',{width:size,height:size,viewBox:`0 0 ${size} ${size}`});
  if(total<=0){ svg.appendChild(h('circle',{cx:size/2,cy:size/2,r:r-thickness/2,stroke:'var(--border)','stroke-width':thickness,fill:'none'})); return svg; }
  let acc=0;
  items.forEach(it=>{
    const v = it.value||0; if(v<=0) return;
    const a0 = (acc/total)*Math.PI*2 - Math.PI/2;
    acc += v;
    const a1 = (acc/total)*Math.PI*2 - Math.PI/2;
    const large = (a1-a0)>Math.PI ? 1 : 0;
    const p0 = [size/2 + r*Math.cos(a0), size/2 + r*Math.sin(a0)];
    const p1 = [size/2 + r*Math.cos(a1), size/2 + r*Math.sin(a1)];
    const p2 = [size/2 + r2*Math.cos(a1), size/2 + r2*Math.sin(a1)];
    const p3 = [size/2 + r2*Math.cos(a0), size/2 + r2*Math.sin(a0)];
    const d = `M${p0[0]},${p0[1]} A${r},${r} 0 ${large} 1 ${p1[0]},${p1[1]} L${p2[0]},${p2[1]} A${r2},${r2} 0 ${large} 0 ${p3[0]},${p3[1]} Z`;
    const pth = h('path',{d, fill:it.color});
    pth.appendChild(h('title',{},`${it.label}: ${fmtEUR(v)} (${fmtPct(v/total)})`));
    svg.appendChild(pth);
  });
  // center text
  svg.appendChild(h('text',{x:size/2,y:size/2-2,'text-anchor':'middle','font-size':12,fill:'var(--muted)'},'Total'));
  svg.appendChild(h('text',{x:size/2,y:size/2+16,'text-anchor':'middle','font-size':16,'font-weight':'600',fill:'var(--text)'},fmtEUR(total)));
  return svg;
}
function sparkline(values, color){
  const W = 120, H = 24;
  const arr = values.map(v=>Number(v)||0);
  const max = Math.max(1, ...arr.map(Math.abs));
  const step = W/(arr.length-1 || 1);
  const pts = arr.map((v,i)=>[i*step, H - (v/max)*(H-4) - 2]);
  const d = pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const svg = h('svg',{class:'sparkline',viewBox:`0 0 ${W} ${H}`,preserveAspectRatio:'none'});
  svg.appendChild(h('path',{d,fill:'none',stroke:color||'var(--accent)','stroke-width':1.5,'stroke-linecap':'round','stroke-linejoin':'round'}));
  // area
  const d2 = d + ` L${pts[pts.length-1][0].toFixed(1)},${H} L${pts[0][0].toFixed(1)},${H} Z`;
  svg.appendChild(h('path',{d:d2,fill:color||'var(--accent)',opacity:0.15}));
  return svg;
}
function niceMax(v){
  if(v<=0) return 1;
  const exp = Math.floor(Math.log10(v));
  const base = Math.pow(10, exp);
  const m = v/base;
  let nice;
  if(m<=1) nice=1; else if(m<=2) nice=2; else if(m<=5) nice=5; else nice=10;
  return nice*base;
}
function formatAxis(v){
  if(Math.abs(v)>=1000) return (v/1000).toFixed(v>=10000?0:1)+'k';
  return v.toFixed(0);
}

/* -------- INVEST -------- */
/* Helpers analyse */
function kpiCard(label, value, delta, iconName, tone){
  const card = h('div',{class:'kpi '+(tone||'')});
  card.appendChild(h('div',{class:'top'},
    h('div',{class:'label'}, label),
    h('div',{class:'icon'}, icon(iconName))
  ));
  card.appendChild(h('div',{class:'value'}, value));
  if(delta && (delta.pct!=null)){
    const pct = (Math.abs(delta.pct)*100).toFixed(1)+' %';
    card.appendChild(h('div',{class:'sub'},
      h('span',{class:'chip '+(delta.dir==='up'?'up':'down')}, delta.dir==='up'?'▲':'▼', pct)
    ));
  }
  return card;
}
function accountCurrent(a){
  // a.current est la source de vérité ; les snapshots ne servent qu'à l'historique/courbe
  if(a.current!=null && a.current!=='' && !isNaN(a.current)) return Number(a.current);
  if(a.snapshots && a.snapshots.length){
    const sorted = a.snapshots.slice().sort((x,y)=>(x.date||'').localeCompare(y.date||''));
    return Number(sorted[sorted.length-1].value)||0;
  }
  return 0;
}
function accountDepositsSum(a){ return sum((a.deposits||[]).map(d=>Number(d.amount)||0)); }
function accountInvested(a){
  // total investi = somme des mouvements (deposits) — source unique de vérité
  return accountDepositsSum(a);
}
function migrateInvestedToDeposits(){
  // un coup de migration : si a.invested existe sans deposits, on crée un mouvement initial
  let changed=false;
  (state.accounts||[]).forEach(a=>{
    a.deposits = a.deposits || [];
    if(a.deposits.length===0 && a.invested!=null && a.invested!=='' && !isNaN(a.invested) && Number(a.invested)!==0){
      a.deposits.push({date: state._migDate || new Date().toISOString().slice(0,10), amount: Number(a.invested), note:'Initial (import)'});
      changed=true;
    }
    if('invested' in a){ delete a.invested; changed=true; }
  });
  if(changed) saveState();
}
function accountPnL(a){ return accountCurrent(a) - accountInvested(a); }
function accountPerf(a){
  const inv = accountInvested(a);
  return inv ? accountPnL(a)/Math.abs(inv) : 0;
}
/* ---- Devises ---- */
function fxRate(cur){
  if(!cur || cur==='EUR') return 1;
  return (state.fxRates && state.fxRates[cur]!=null) ? Number(state.fxRates[cur]) : 1;
}
function fxSymbol(cur){
  if(cur==='USD') return '$';
  if(cur==='AED') return 'AED';
  return '€';
}
function fxToEUR(amount, cur){ return (Number(amount)||0) * fxRate(cur); }
function accountCurrentEUR(a){ return fxToEUR(accountCurrent(a), a.currency); }
function accountInvestedEUR(a){ return fxToEUR(accountInvested(a), a.currency); }
function accountPnLEUR(a){ return accountCurrentEUR(a) - accountInvestedEUR(a); }
function fmtCurrency(value, cur){
  const sym = fxSymbol(cur);
  const v = Math.round(Number(value)||0);
  const s = String(v).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  if(cur==='AED') return s+' AED';
  if(cur==='USD') return '$ '+s;
  return s+' €';
}
function buildPortfolioTimeline(){
  // collecte tous les snapshots, par date triée, valeur totale
  const evts = [];
  (state.accounts||[]).forEach(a=>{
    (a.snapshots||[]).forEach(s=>{
      if(s.date) evts.push({date:s.date, account:a.name, value: fxToEUR(Number(s.value)||0, a.currency||'EUR')});
    });
  });
  evts.sort((a,b)=>a.date.localeCompare(b.date));
  // pour chaque date, on prend la dernière valeur connue de chaque compte
  const dates = [...new Set(evts.map(e=>e.date))].sort();
  const lastByAcct = {};
  return dates.map(d=>{
    evts.filter(e=>e.date===d).forEach(e=>lastByAcct[e.account]=e.value);
    return {date:d, total: sum(Object.values(lastByAcct))};
  });
}

  });

  // Ligne TOTAL
  const trT = h('tr',{class:'total'});
  trT.appendChild(h('td',{},'TOTAL'));
  trT.appendChild(h('td',{},''));
  trT.appendChild(h('td',{class:'mono'}, fmtEUR(totInv)));
  trT.appendChild(h('td',{class:'mono', style:'font-weight:700'}, fmtEUR(totCur)));
  trT.appendChild(h('td',{class:'mono ' + (totPnl>=0?'pos':'neg')}, fmtEUR(totPnl)));
  trT.appendChild(h('td',{class:'mono ' + (totPnl>=0?'pos':'neg')}, (perfPct*100).toFixed(1)+' %'));
  trT.appendChild(h('td',{},''));
  tb.appendChild(trT);
  tbl.appendChild(tb);
  wrap.appendChild(tbl); card.appendChild(wrap);
  main.appendChild(card);

  // ===== Sections repliables =====

  // Graphiques
  const chartsDet = h('details', {class:'card', style:'padding:14px 20px'});
  chartsDet.appendChild(h('summary',{style:'cursor:pointer;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:10px'},
    h('span',{style:'color:var(--muted);font-size:12px'},'▶'),
    h('span',{},'Graphiques d\'analyse')
  ));
  const chartsWrap = h('div', {style:'margin-top:14px'});
  // donut + line
  const chartsRow = h('div', {class:'split'});
  const donutItems = accs.filter(a=>accountCurrentEUR(a)>0)
    .map(a=>({label:a.name, value:accountCurrentEUR(a), color:a.color||'#64748b'}))
    .sort((a,b)=>b.value-a.value);
  if(donutItems.length){
    const donutCard = h('div',{class:'card'});
    donutCard.appendChild(h('div',{class:'card-head'}, h('div',{class:'card-title'},'Répartition par compte')));
    const dwrap = h('div',{class:'donut-wrap'});
    dwrap.appendChild(donutChart(donutItems,{size:180,thickness:30}));
    const lg = h('div',{class:'legend'});
    donutItems.forEach(it=>{
      const pct = totCur>0?(it.value/totCur*100).toFixed(1):'0.0';
      lg.appendChild(h('div',{class:'legend-item'},
        h('span',{class:'dot',style:`background:${it.color}`}),
        h('span',{class:'lbl'},it.label),
        h('span',{class:'val mono'}, fmtEUR(it.value)+' · '+pct+'%')));
    });
    dwrap.appendChild(lg);
    donutCard.appendChild(dwrap);
    chartsRow.appendChild(donutCard);
  }
  const tl = buildPortfolioTimeline();
  const evCard = h('div',{class:'card'});
  evCard.appendChild(h('div',{class:'card-head'},
    h('div',{class:'card-title'},'Évolution valeur'),
    h('span',{class:'tag '+(totPnl>=0?'success':'danger')}, (perfPct>=0?'+':'')+(perfPct*100).toFixed(1)+'%')));
  if(tl.length>=2){
    evCard.appendChild(lineChart(
      [{name:'Total', values: tl.map(x=>x.total), color:'var(--accent)'}],
      tl.map(x=>x.date.slice(2,7).replace('-','/')),
      {area:true, height:200}
    ));
  } else {
    evCard.appendChild(h('div',{style:'padding:30px;text-align:center;color:var(--muted);font-size:13px'},'Pas encore assez de données. Édite la valeur d\'au moins 2 plateformes à des dates différentes.'));
  }
  chartsRow.appendChild(evCard);
  chartsWrap.appendChild(chartsRow);
  // allocation par classe
  const byType = {};
  accs.forEach(a=>{ const t=a.type||'autre'; byType[t]=(byType[t]||0)+accountCurrentEUR(a); });
  const typeColors = {crypto:'#f59e0b',bourse:'#2563eb',immo:'#7c3aed',epargne:'#0d9488',pe:'#dc2626',or:'#eab308',cash:'#14b8a6',autre:'#64748b'};
  const typeItems = Object.entries(byType).filter(([_,v])=>v>0).map(([k,v])=>({label:k.toUpperCase(), value:v, color:typeColors[k]||'#64748b'})).sort((a,b)=>b.value-a.value);
  if(typeItems.length){
    const tcard = h('div',{class:'card', style:'margin-top:14px'});
    tcard.appendChild(h('div',{class:'card-head'}, h('div',{class:'card-title'},'Allocation par classe d\'actif')));
    const w2 = h('div',{class:'donut-wrap'});
    w2.appendChild(donutChart(typeItems,{size:160,thickness:28}));
    const lg2 = h('div',{class:'legend'});
    typeItems.forEach(it=>{
      const pct = totCur>0?(it.value/totCur*100).toFixed(1):'0.0';
      lg2.appendChild(h('div',{class:'legend-item'},
        h('span',{class:'dot',style:`background:${it.color}`}),
        h('span',{class:'lbl'},it.label),
        h('span',{class:'val mono'}, fmtEUR(it.value)+' · '+pct+'%')));
    });
    w2.appendChild(lg2);
    tcard.appendChild(w2);
    chartsWrap.appendChild(tcard);
  }
  chartsDet.appendChild(chartsWrap);
  main.appendChild(chartsDet);

  // Mouvements globaux (vue à plat)
  const allDeps = [];
  accs.forEach((a)=>{
    (a.deposits||[]).forEach((d,di)=>{ allDeps.push({d, di, a}); });
  });
  allDeps.sort((x,y)=>(y.d.date||'').localeCompare(x.d.date||''));
  if(allDeps.length){
    const mvDet = h('details', {class:'card', style:'padding:14px 20px'});
    mvDet.appendChild(h('summary',{style:'cursor:pointer;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:10px'},
      h('span',{style:'color:var(--muted);font-size:12px'},'▶'),
      h('span',{}, 'Tous les mouvements ('+allDeps.length+' · total '+fmtEUR(sum(allDeps.map(x=>Number(x.d.amount)||0)))+')')
    ));
    const mvWrap = h('div',{class:'table-wrap', style:'border:none;margin-top:12px;max-height:520px'});
    const mvTbl = h('table');
    const mvTrh = h('tr');
    ['Date','Plateforme','Montant','Note',''].forEach(t=>mvTrh.appendChild(h('th',{},t)));
    mvTbl.appendChild(h('thead',{}, mvTrh));
    const mvTb = h('tbody');
    allDeps.forEach(({d,di,a})=>{
      const tr = h('tr');
      tr.appendChild(h('td',{style:'min-width:140px'}, textInput(d.date||'', v=>{d.date=v;})));
      tr.appendChild(h('td',{},
        h('div',{style:'display:flex;align-items:center;gap:8px'},
          h('span',{style:`width:8px;height:8px;border-radius:50%;background:${a.color||'#64748b'};flex-shrink:0`}),
          h('span',{},a.name))));
      tr.appendChild(h('td',{class:'num-cell','data-suffix':'€', style:'min-width:130px'}, numInput(d.amount, v=>{d.amount=v;})));
      tr.appendChild(h('td',{}, textInput(d.note||'', v=>{d.note=v;})));
      tr.appendChild(h('td',{style:'text-align:right;width:40px'}, h('button',{class:'icon ghost danger', onclick:()=>{a.deposits.splice(di,1);saveState();renderAll();}}, icon('trash'))));
      mvTb.appendChild(tr);
    });
    mvTbl.appendChild(mvTb);
    mvWrap.appendChild(mvTbl);
    mvDet.appendChild(mvWrap);
    main.appendChild(mvDet);
  }

  // Versements mensuels année courante (legacy view, en optionnel)
  const y = state.currentYear;
  const dY = yearData(y);
  if(dY && dY.invest && dY.invest.length){
    const moDet = h('details', {class:'card', style:'padding:14px 20px'});
    moDet.appendChild(h('summary',{style:'cursor:pointer;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:10px'},
      h('span',{style:'color:var(--muted);font-size:12px'},'▶'),
      h('span',{}, 'Versements mensuels '+y+' (vue tableau)')
    ));
    const invTotMo = monthInvest(y);
    moDet.appendChild(h('div',{style:'margin-top:14px'}, barChart([{name:'Versé', values:invTotMo, color:'var(--purple)'}], MONTHS_SHORT)));
    const tableM = h('div',{class:'table-wrap',style:'margin-top:14px'});
    const tblM = h('table');
    const trhM = h('tr');
    trhM.appendChild(h('th',{},'Plateforme'));
    MONTHS_SHORT.forEach(m=>trhM.appendChild(h('th',{},m)));
    trhM.appendChild(h('th',{},'Cumul'));
    trhM.appendChild(h('th',{},''));
    tblM.appendChild(h('thead',{},trhM));
    const tbM = h('tbody');
    dY.invest.forEach((p, idx)=>{
      const tr = h('tr');
      tr.appendChild(h('td',{}, textInput(p.name, v=>p.name=v)));
      let tot=0;
      p.amounts.forEach((v,i)=>{ const td=h('td'); td.appendChild(numInput(v, val=>p.amounts[i]=val)); if(v)tot+=v; tr.appendChild(td); });
      tr.appendChild(h('td',{class:'mono'}, h('strong',{},fmtEUR(tot))));
      tr.appendChild(h('td',{}, h('button',{class:'icon ghost danger', onclick:()=>{if(confirm('Supprimer ?')){dY.invest.splice(idx,1);saveState();renderAll();}}}, icon('trash'))));
      tbM.appendChild(tr);
    });
    const trTM = h('tr',{class:'total'});
    trTM.appendChild(h('td',{},'Total'));
    invTotMo.forEach(v=>trTM.appendChild(h('td',{class:'mono'}, fmtEUR(v))));
    trTM.appendChild(h('td',{class:'mono'}, fmtEUR(sum(invTotMo))));
    trTM.appendChild(h('td',{},''));
    tbM.appendChild(trTM);
    tblM.appendChild(tbM);
    tableM.appendChild(tblM);
    moDet.appendChild(tableM);
    main.appendChild(moDet);
  }

  // Cryptos
  if(state.cryptos && state.cryptos.length){
    const cdet = h('details', {class:'card', style:'padding:14px 20px'});
    cdet.appendChild(h('summary',{style:'cursor:pointer;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:10px'},
      h('span',{style:'color:var(--muted);font-size:12px'},'▶'),
      h('span',{}, 'Allocation cryptos détaillée ('+state.cryptos.length+')')
    ));
    const w = h('div',{class:'table-wrap', style:'margin-top:14px'});
    const t = h('table');
    const th = h('tr');
    ['Symbole','Montant','%','Prix achat','Prix actuel','G/P (%)',''].forEach(x=>th.appendChild(h('th',{},x)));
    t.appendChild(h('thead',{},th));
    const tbb = h('tbody');
    state.cryptos.forEach((c,i)=>{
      const r = h('tr');
      r.appendChild(h('td',{}, textInput(c.symbol||'', v=>c.symbol=v)));
      r.appendChild(h('td',{class:'mono'}, numInput(c.amount, v=>c.amount=v)));
      r.appendChild(h('td',{class:'mono'}, numInput(c.pct, v=>c.pct=v)));
      r.appendChild(h('td',{class:'mono'}, numInput(c.buy_price, v=>c.buy_price=v)));
      r.appendChild(h('td',{class:'mono'}, numInput(c.current_price, v=>c.current_price=v)));
      const gp = (Number(c.buy_price)||0)>0 ? ((Number(c.current_price)||0) - Number(c.buy_price))/Number(c.buy_price) : 0;
      r.appendChild(h('td',{class:'mono ' + (gp>=0?'pos':'neg')}, (gp*100).toFixed(1)+' %'));
      r.appendChild(h('td',{}, h('button',{class:'icon ghost danger', onclick:()=>{state.cryptos.splice(i,1);saveState();renderAll();}}, icon('trash'))));
      tbb.appendChild(r);
    });
    t.appendChild(tbb);
    w.appendChild(t);
    cdet.appendChild(w);
    cdet.appendChild(h('button',{class:'ghost', style:'margin-top:10px', onclick:()=>{
      const n=prompt('Symbole crypto ?'); if(n){ state.cryptos.push({symbol:n, amount:0, pct:0, buy_price:0, current_price:0}); saveState(); renderAll(); }
    }}, icon('plus'),'Crypto'));
    main.appendChild(cdet);
  }

  // Yann
  if(state.yann){
    const ydet = h('details', {class:'card', style:'padding:14px 20px'});
    ydet.appendChild(h('summary',{style:'cursor:pointer;font-weight:600;font-size:14px;list-style:none;display:flex;align-items:center;gap:10px'},
      h('span',{style:'color:var(--muted);font-size:12px'},'▶'),
      h('span',{}, 'Remboursement Yann ('+fmtEUR(state.yann.paid||0)+' / '+fmtEUR(state.yann.total||0)+')')
    ));
    const yrow = h('div',{class:'split',style:'gap:14px;margin-top:14px'});
    yrow.appendChild(h('div',{class:'field'}, h('label',{},'Total à rembourser'), numInput(state.yann.total, v=>state.yann.total=v)));
    yrow.appendChild(h('div',{class:'field'}, h('label',{},'Somme remboursée'), numInput(state.yann.paid, v=>state.yann.paid=v)));
    yrow.appendChild(h('div',{class:'field'}, h('label',{},'Restant'), numInput(state.yann.remaining, v=>state.yann.remaining=v)));
    ydet.appendChild(yrow);
    main.appendChild(ydet);
  }
}


/* -------- PATRIMOINE -------- */
function renderPatrimoine(){
  const main = document.getElementById('content'); main.innerHTML=''; main.className='content fade-in';

  // Calculs
  const cash = sum((state.cash||[]).map(c=>Number(c.eur)||0));
  const accs = state.accounts || [];
  const investCur = sum(accs.map(accountCurrentEUR));
  const investBy = {};
  accs.forEach(a=>{ const t=a.type||'autre'; investBy[t]=(investBy[t]||0)+accountCurrentEUR(a); });
  const assets = state.assets || [];
  const assetsTot = sum(assets.map(x=>Number(x.value)||0));
  const debts = state.debts || [];
  const debtsTot = sum(debts.map(d=>Number(d.amount)||0));

  const brut = cash + investCur + assetsTot;
  const net = brut - debtsTot;

  main.appendChild(h('div',{class:'section-head'},
    h('div',{}, h('h2',{},'Patrimoine'), h('div',{class:'sub'},'Vue consolidée actif / passif')),
  ));

  // KPI
  const grid = h('div',{class:'kpi-grid'});
  grid.appendChild(kpiCard('Patrimoine brut', fmtEUR(brut), null, 'wallet'));
  grid.appendChild(kpiCard('Dettes', fmtEUR(debtsTot), null, 'debt'));
  grid.appendChild(kpiCard('Patrimoine net', fmtEUR(net), null, 'invest'));
  grid.appendChild(kpiCard('Liquidités', fmtEUR(cash), null, 'cash'));
  main.appendChild(grid);

  // Donut allocation patrimoine
  const palette = {cash:'#14b8a6', crypto:'#f59e0b', bourse:'#2563eb', immo:'#7c3aed', epargne:'#0d9488', pe:'#dc2626', or:'#eab308', autre:'#64748b', assets:'#0ea5e9'};
  const items = [];
  if(cash>0) items.push({label:'Cash', value:cash, color:palette.cash});
  Object.entries(investBy).forEach(([k,v])=>{ if(v>0) items.push({label:k.charAt(0).toUpperCase()+k.slice(1), value:v, color:palette[k]||palette.autre}); });
  if(assetsTot>0) items.push({label:'Biens / autres', value:assetsTot, color:palette.assets});
  items.sort((a,b)=>b.value-a.value);

  const row = h('div',{class:'split'});
  const pcard = h('div',{class:'card'});
  pcard.appendChild(h('div',{class:'card-head'}, h('div',{class:'card-title'},'Répartition patrimoine'), h('span',{class:'tag info'}, fmtEUR(brut))));
  const pwrap = h('div',{class:'donut-wrap'});
  pwrap.appendChild(donutChart(items,{size:200,thickness:32}));
  const lg = h('div',{class:'legend'});
  items.forEach(it=>{
    const pct = brut>0?(it.value/brut*100).toFixed(1):'0.0';
    lg.appendChild(h('div',{class:'legend-item'},
      h('span',{class:'dot',style:`background:${it.color}`}),
      h('span',{class:'lbl'},it.label),
      h('span',{class:'val mono'}, fmtEUR(it.value)+' · '+pct+'%')));
  });
  pwrap.appendChild(lg);
  pcard.appendChild(pwrap);
  row.appendChild(pcard);

  // Évolution patrimoine net (snapshots invest + cash actuel statique)
  const tl = buildPortfolioTimeline();
  const evCard = h('div',{class:'card'});
  evCard.appendChild(h('div',{class:'card-head'}, h('div',{class:'card-title'},'Évolution patrimoine investi')));
  if(tl.length>=2){
    evCard.appendChild(lineChart(
      [{name:'Invest', values: tl.map(x=>x.total), color:'var(--accent)'}],
      tl.map(x=>x.date.slice(2,7).replace('-','/')),
      {area:true, height:220}
    ));
  } else {
    evCard.appendChild(h('div',{class:'empty', style:'padding:30px;text-align:center;color:var(--muted)'},
      'Ajoute des snapshots dans Investissements pour voir l\'évolution'));
  }
  row.appendChild(evCard);
  main.appendChild(row);

  // Bilan détaillé : ACTIF
  const actifCard = h('div',{class:'card', style:'padding:0'});
  actifCard.appendChild(h('div',{class:'card-head', style:'padding:16px 20px;border-bottom:1px solid var(--border-soft)'},
    h('div',{class:'card-title'}, 'Actif'),
    h('span',{class:'tag success'}, fmtEUR(brut))));
  const aw = h('div',{class:'table-wrap',style:'border:none'});
  const at = h('table');
  const ath = h('tr');
  ['Poste','Catégorie','Valeur','Part',''].forEach(x=>ath.appendChild(h('th',{},x)));
  at.appendChild(h('thead',{},ath));
  const atb = h('tbody');

  // Cash lines (éditables)
  (state.cash||[]).forEach((c,idx)=>{
    const v = Number(c.eur)||0;
    const tr = h('tr');
    tr.appendChild(h('td',{}, textInput(c.name||'', val=>{c.name=val;})));
    tr.appendChild(h('td',{}, h('span',{class:'tag'}, 'Cash')));
    tr.appendChild(h('td',{class:'num-cell','data-suffix':'€', style:'min-width:140px'}, numInput(c.eur, val=>{c.eur=val;})));
    tr.appendChild(h('td',{class:'mono'}, brut>0?(v/brut*100).toFixed(1)+'%':'—'));
    tr.appendChild(h('td',{style:'text-align:right;width:50px'},
      h('button',{class:'icon ghost danger', title:'Supprimer ce compte cash', onclick:()=>{
        if(confirm('Supprimer « '+(c.name||'compte')+' » ?')){ state.cash.splice(idx,1); saveState(); renderAll(); }
      }}, icon('trash'))));
    atb.appendChild(tr);
  });
  // Comptes invest (lien vers onglet Investissements)
  accs.forEach((a,idx)=>{
    const v = accountCurrentEUR(a);
    if(v===0) return;
    const tr = h('tr');
    tr.appendChild(h('td',{},
      h('div',{style:'display:flex;align-items:center;gap:10px'},
        h('span',{style:`width:8px;height:8px;border-radius:50%;background:${a.color||'#64748b'};display:inline-block`}),
        a.name,
        a.currency && a.currency!=='EUR' ? h('span',{class:'tag',style:'font-size:10px'}, a.currency) : null)));
    tr.appendChild(h('td',{}, h('span',{class:'tag'}, (a.type||'autre').toUpperCase())));
    tr.appendChild(h('td',{class:'mono'}, fmtEUR(v)));
    tr.appendChild(h('td',{class:'mono'}, brut>0?(v/brut*100).toFixed(1)+'%':'—'));
    tr.appendChild(h('td',{style:'text-align:right;width:50px'},
      h('button',{class:'icon ghost', title:'Modifier dans Investissements', onclick:()=>{
        state._depositsOpen = idx;
        document.querySelectorAll('.nav-item').forEach(el=>{ if(el.dataset.tab==='invest') el.click(); });
      }}, icon('edit') )));
    atb.appendChild(tr);
  });
  // Assets custom
  assets.forEach((x,i)=>{
    const v = Number(x.value)||0;
    const tr = h('tr');
    tr.appendChild(h('td',{}, textInput(x.name||'', val=>{x.name=val;})));
    tr.appendChild(h('td',{}, textInput(x.category||'Bien', val=>{x.category=val;})));
    tr.appendChild(h('td',{class:'num-cell','data-suffix':'€', style:'min-width:140px'}, numInput(x.value, val=>{x.value=val;})));
    tr.appendChild(h('td',{class:'mono'}, brut>0?(v/brut*100).toFixed(1)+'%':'—'));
    tr.appendChild(h('td',{style:'text-align:right;width:50px'},
      h('button',{class:'icon ghost danger', title:'Supprimer ce bien', onclick:()=>{
        if(confirm('Supprimer « '+(x.name||'bien')+' » ?')){ state.assets.splice(i,1); saveState(); renderAll(); }
      }}, icon('trash'))));
    atb.appendChild(tr);
  });
  at.appendChild(atb);
  aw.appendChild(at); actifCard.appendChild(aw);
  actifCard.appendChild(h('div',{style:'padding:12px 20px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:10px'},
    h('button',{class:'ghost', onclick:()=>{
      const n=prompt('Nom du compte cash (banque, espèces, etc.) ?'); if(n){
        state.cash = state.cash || [];
        state.cash.push({name:n, eur:0});
        saveState(); renderAll();
      }
    }}, icon('plus'),'Ajouter un compte cash'),
    h('button',{class:'ghost', onclick:()=>{
      const n=prompt('Nom du bien (voiture, montre, mobilier, etc.) ?'); if(n){
        state.assets = state.assets || [];
        state.assets.push({name:n, category:'Bien', value:0});
        saveState(); renderAll();
      }
    }}, icon('plus'),'Ajouter un bien')));
  main.appendChild(actifCard);

  // PASSIF
  const passifCard = h('div',{class:'card', style:'padding:0'});
  passifCard.appendChild(h('div',{class:'card-head', style:'padding:16px 20px;border-bottom:1px solid var(--border-soft)'},
    h('div',{class:'card-title'}, 'Passif (dettes)'),
    h('span',{class:'tag danger'}, fmtEUR(debtsTot))));
  const pw = h('div',{class:'table-wrap',style:'border:none'});
  const pt = h('table');
  const pth = h('tr');
  ['Date','Libellé','Montant','Statut','Note'].forEach(x=>pth.appendChild(h('th',{},x)));
  pt.appendChild(h('thead',{},pth));
  const ptb = h('tbody');
  debts.forEach(dd=>{
    const tr = h('tr');
    tr.appendChild(h('td',{}, dd.date||''));
    tr.appendChild(h('td',{}, dd.label||''));
    tr.appendChild(h('td',{class:'mono'}, fmtEUR(Number(dd.amount)||0)));
    tr.appendChild(h('td',{}, h('span',{class:'tag '+((dd.statut||'').toUpperCase()==='CLOSE'?'success':'')}, dd.statut||'')));
    tr.appendChild(h('td',{}, dd.note||''));
    ptb.appendChild(tr);
  });
  pt.appendChild(ptb);
  pw.appendChild(pt); passifCard.appendChild(pw);
  main.appendChild(passifCard);

  // Synthèse finale
  const synth = h('div',{class:'card'});
  synth.appendChild(h('div',{class:'card-head'}, h('div',{class:'card-title'},'Bilan')));
  const tt = h('table',{style:'width:100%'});
  const ttb = h('tbody');
  [
    ['Actif total', brut, 'pos'],
    ['  – Liquidités', cash, ''],
    ['  – Investissements', investCur, ''],
    ['  – Biens', assetsTot, ''],
    ['Passif total', -debtsTot, 'neg'],
    ['Patrimoine net', net, net>=0?'pos':'neg'],
  ].forEach(([lbl,val,cls],i)=>{
    const tr = h('tr', i===5?{class:'total'}:{});
    tr.appendChild(h('td',{style:'padding:10px 14px'}, lbl));
    tr.appendChild(h('td',{class:'mono '+cls, style:'padding:10px 14px;text-align:right;font-weight:'+(i===0||i===4||i===5?'700':'400')}, fmtEUR(val)));
    ttb.appendChild(tr);
  });
  tt.appendChild(ttb);
  synth.appendChild(tt);
  main.appendChild(synth);
}

/* -------- ALLOCATION -------- */
function renderAllocation(){
  const main = document.getElementById('content'); main.innerHTML=''; main.className='content fade-in';
  const a = state.allocation;
  const allocSum = sum(a.items.map(x=>x.amount||0));
  const restant = (a.total||0) - allocSum;

  main.appendChild(h('div',{class:'section-head'},
    h('div',{}, h('h2',{},'Allocation mensuelle'), h('div',{class:'sub'},'Stratégie de répartition du cash'))
  ));

  const kcards = h('div',{class:'kpi-grid'});
  const mk = (l,v,t) => {
    const c = h('div',{class:'kpi '+(t||'')});
    c.appendChild(h('div',{class:'top'}, h('div',{class:'label'},l), h('div',{class:'icon'}, icon('allocation'))));
    c.appendChild(h('div',{class:'value'}, v));
    return c;
  };
  const totCard = h('div',{class:'kpi'});
  totCard.appendChild(h('div',{class:'top'},
    h('div',{class:'label'},'Somme à allouer'),
    h('div',{class:'icon'}, icon('wallet'))
  ));
  const totInput = numInput(a.total, v=>{a.total=v});
  totInput.style.fontSize='22px'; totInput.style.fontWeight='600'; totInput.style.border='none'; totInput.style.padding='0';
  totCard.appendChild(totInput);
  kcards.appendChild(totCard);
  kcards.appendChild(mk('Déjà alloué', fmtEUR2(allocSum),'purple'));
  kcards.appendChild(mk('Restant', fmtEUR2(restant), restant<0?'danger':(restant>0?'warn':'success')));
  main.appendChild(kcards);

  const card = h('div',{class:'card'});
  card.appendChild(h('div',{class:'card-head'},
    h('div',{class:'card-title'},'Répartition'),
    h('button',{class:'sm', onclick:()=>{ a.items.push({name:'Nouveau', amount:0}); saveState(); renderAll(); }}, icon('plus'),'Poste')
  ));
  const wrap = h('div',{class:'table-wrap'});
  const tbl = h('table');
  tbl.appendChild(h('thead',{},h('tr',{},
    h('th',{},'Poste'), h('th',{},'Montant'), h('th',{},'% alloué'), h('th',{},''), h('th',{},'')
  )));
  const tb = h('tbody');
  a.items.forEach((it,idx)=>{
    const tr = h('tr');
    tr.appendChild(h('td',{}, textInput(it.name, v=>it.name=v)));
    tr.appendChild(h('td',{}, numInput(it.amount, v=>it.amount=v)));
    const pct = allocSum>0 ? (it.amount||0)/allocSum : 0;
    tr.appendChild(h('td',{class:'mono'}, fmtPct(pct)));
    const td = h('td',{}); td.appendChild(h('div',{class:'bar default',style:'width:120px'}, h('div',{style:'width:'+(pct*100).toFixed(1)+'%'})));
    tr.appendChild(td);
    tr.appendChild(h('td',{}, h('button',{class:'icon ghost danger', onclick:()=>{a.items.splice(idx,1);saveState();renderAll();}}, icon('trash'))));
    tb.appendChild(tr);
  });
  tb.appendChild(h('tr',{class:'total'}, h('td',{},'Total'), h('td',{class:'mono'}, fmtEUR2(allocSum)), h('td',{},''), h('td',{},''), h('td',{},'')));
  tbl.appendChild(tb);
  wrap.appendChild(tbl); card.appendChild(wrap);
  main.appendChild(card);
}

/* -------- CASH -------- */
function renderCash(){

  ));

  const tot = sum(state.cash.map(c=>c.eur||0));
  const palette = ['#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#db2777','#65a30d'];

  const tblCard = h('div',{class:'card',style:'padding:0'});
  const wrap = h('div',{class:'table-wrap',style:'border:none'});
  const tbl = h('table');
  tbl.appendChild(h('thead',{},h('tr',{},
    h('th',{},'Compte'), h('th',{},'Solde'), h('th',{},'%'), h('th',{},''), h('th',{},'')
  )));
  const tb = h('tbody');
  state.cash.forEach((c,idx)=>{
    const pct = tot>0 ? (c.eur||0)/tot : 0;

    tr.appendChild(h('td',{}, textInput(c.name, v=>c.name=v)));

  donut.appendChild(h('div',{class:'card-head'}, h('div',{class:'card-title'},'Vue globale'), h('span',{class:'tag info'}, fmtEUR(tot))));
  donut.appendChild(donutChart(items,{size:220,thickness:30}));

/* -------- DETTES -------- */
function renderDettes(){
  const main = document.getElementById('content'); main.innerHTML=''; main.className='content fade-in';
  main.appendChild(h('div',{class:'section-head'},
    h('div',{}, h('h2',{},'Dettes'), h('div',{class:'sub'},'Crédits et engagements')),
    h('button',{class:'primary', onclick:()=>{state.debts.push({date:new Date().toISOString().slice(0,10),label:'Nouvelle dette',amount:0,statut:'OPEN',note:''});saveState();renderAll();}}, icon('plus'),'Dette')
  ));

  const card = h('div',{class:'card',style:'padding:0'});
  const wrap = h('div',{class:'table-wrap',style:'border:none'});
  const tbl = h('table');
  tbl.appendChild(h('thead',{},h('tr',{},
    h('th',{},'Date'), h('th',{},'Libellé'), h('th',{},'Montant'), h('th',{},'Statut'), h('th',{},'Note'), h('th',{},'')
  )));
  const tb = h('tbody');
  state.debts.forEach((d,idx)=>{
    const tr = h('tr');
    const dIn = h('input',{type:'date', value:d.date||''}); dIn.addEventListener('change',()=>{d.date=dIn.value;saveState();});
    tr.appendChild(h('td',{}, dIn));
    tr.appendChild(h('td',{}, textInput(d.label, v=>d.label=v)));
    tr.appendChild(h('td',{}, numInput(d.amount, v=>d.amount=v)));
    const sel = h('select');
    ['OPEN','CLOSE'].forEach(s=>{const o=h('option',{value:s},s); if((d.statut||'').toUpperCase()===s) o.setAttribute('selected','true'); sel.appendChild(o);});
    sel.addEventListener('change',()=>{d.statut=sel.value;saveState();renderAll();});
    const stTd = h('td',{});
    stTd.appendChild(h('span',{class:'tag '+((d.statut||'').toUpperCase()==='OPEN'?'warn':'success')},(d.statut||'').toUpperCase()==='OPEN'?'Ouverte':'Fermée'));
    stTd.appendChild(sel);
    sel.style.marginTop='4px';
    tr.appendChild(stTd);
    tr.appendChild(h('td',{}, textInput(d.note, v=>d.note=v)));
    tr.appendChild(h('td',{}, h('button',{class:'icon ghost danger', onclick:()=>{state.debts.splice(idx,1);saveState();renderAll();}}, icon('trash'))));
    tb.appendChild(tr);
  });

  tb.appendChild(h('tr',{class:'total'},
    h('td',{},'Total ouvert'), h('td',{},''), h('td',{class:'mono'}, fmtEUR(sum(open.map(x=>x.amount||0)))),
    h('td',{},''), h('td',{},''), h('td',{},'')
  ));
  tbl.appendChild(tb); wrap.appendChild(tbl); card.appendChild(wrap);

/* -------- OBJECTIFS -------- */
function renderObjectifs(){
  const main = document.getElementById('content'); main.innerHTML=''; main.className='content fade-in';
  const done = state.objectifs.filter(o=>o.done).length;
  const total = state.objectifs.length;
  const pct = total ? done/total : 0;

  main.appendChild(h('div',{class:'section-head'},
    h('div',{}, h('h2',{},'Objectifs personnels'), h('div',{class:'sub'}, done+' / '+total+' atteints')),
    h('button',{class:'primary', onclick:()=>{state.objectifs.push({name:'Nouvel objectif',done:false});saveState();renderAll();}}, icon('plus'),'Objectif')
  ));

  const prog = h('div',{class:'card'});
  prog.appendChild(h('div',{class:'card-head'},
    h('div',{class:'card-title'},'Progression'),
    h('span',{class:'tag success'}, fmtPct(pct))
  ));
  prog.appendChild(h('div',{class:'bar success',style:'height:10px'}, h('div',{style:'width:'+(pct*100).toFixed(1)+'%'})));
  main.appendChild(prog);

  const card = h('div',{class:'card'});
  const list = h('div',{class:'checklist'});
  state.objectifs.forEach((o,idx)=>{
    const row = h('div',{class:'check-row'+(o.done?' done':'')});
    const cb = h('input',{type:'checkbox'}); if(o.done) cb.setAttribute('checked','checked');
    cb.addEventListener('change',()=>{o.done=cb.checked;saveState();renderAll();});
    const name = h('input',{type:'text', value:o.name,class:'obj-name'});
    name.style.flex='1'; name.style.fontWeight='500';
    name.addEventListener('change',()=>{o.name=name.value;saveState();});
    const rm = h('button',{class:'icon ghost danger', onclick:()=>{state.objectifs.splice(idx,1);saveState();renderAll();}}, icon('trash'));
    row.append(cb, name, rm);
    list.appendChild(row);
  });
  if(total===0) list.appendChild(h('div',{class:'empty'}, 'Aucun objectif pour l\'instant.'));
  card.appendChild(list);
  main.appendChild(card);
}

/* -------- HISTORIQUE -------- */
function renderHistorique(){
  const main = document.getElementById('content'); main.innerHTML=''; main.className='content fade-in';
  main.appendChild(h('div',{class:'section-head'},
    h('div',{}, h('h2',{},'Historique'), h('div',{class:'sub'},'Comparatif multi-années'))
  ));
  const years = Object.keys(state.years).sort();

  // Line chart: dépenses / invest / salaire / reçu per year totals
  const dep = years.map(y=>sum(monthTotals(Number(y))));
  const inv = years.map(y=>sum(monthInvest(Number(y))));
  const rec = years.map(y=>sum(monthRecu(Number(y))));
  const sal = years.map(y=>sum(monthSal(Number(y))));

  const chartCard = h('div',{class:'card'});
  chartCard.appendChild(h('div',{class:'card-head'},
    h('div',{class:'card-title'},'Évolution annuelle'),
    h('div',{class:'flex'},
      h('span',{class:'tag',style:'color:var(--danger);background:var(--danger-soft);border-color:transparent'},'Dépenses'),
      h('span',{class:'tag',style:'color:var(--purple);background:var(--purple-soft);border-color:transparent'},'Invest'),
      h('span',{class:'tag',style:'color:#0ea5e9;background:rgba(14,165,233,.12);border-color:transparent'},'Salaire'),
      h('span',{class:'tag',style:'color:var(--success);background:var(--success-soft);border-color:transparent'},'Reçu'),
    )
  ));
  chartCard.appendChild(lineChart([
    {name:'Dépenses', values:dep, color:'var(--danger)'},
    {name:'Invest',   values:inv, color:'var(--purple)'},
    {name:'Salaire',  values:sal, color:'#0ea5e9'},
    {name:'Reçu',     values:rec, color:'var(--success)'},
  ], years, {area:true}));
  main.appendChild(chartCard);

  // Summary table
  const card = h('div',{class:'card',style:'padding:0'});
  const wrap = h('div',{class:'table-wrap',style:'border:none'});
  const tbl = h('table');
  const trh = h('tr'); trh.appendChild(h('th',{},''));
  years.forEach(y=>trh.appendChild(h('th',{},y)));
  tbl.appendChild(h('thead',{},trh));
  const tb = h('tbody');
  function addRow(label, fn, fmt=fmtEUR, cls=''){
    const tr = h('tr'); tr.appendChild(h('td',{style:'font-weight:500'},label));
    years.forEach(y=>{ const v = fn(Number(y)); tr.appendChild(h('td',{class:'mono '+cls}, typeof v==='string'?v:fmt(v))); });
    tb.appendChild(tr);
  }
  addRow('Dépenses', y=>sum(monthTotals(y)),fmtEUR,'neg');
  addRow('Investissements', y=>sum(monthInvest(y)));
  addRow('Salaire', y=>sum(monthSal(y)),fmtEUR,'pos');
  addRow('Argent reçu', y=>sum(monthRecu(y)),fmtEUR,'pos');
  addRow('Épargne', y=>(sum(monthSal(y))+sum(monthRecu(y)))-sum(monthTotals(y)));
  addRow('Taux épargne', y=>{const r=sum(monthSal(y))+sum(monthRecu(y));return r>0?fmtPct((r-sum(monthTotals(y)))/r):'—'},v=>v);
  addRow('Objectif mensuel (moy)', y=>yearObjectif(y));
  tbl.appendChild(tb); wrap.appendChild(tbl); card.appendChild(wrap);
  main.appendChild(card);

  // Per category
  const card2 = h('div',{class:'card',style:'padding:0;margin-top:16px'});
  const wrap2 = h('div',{class:'table-wrap',style:'border:none'});
  const tbl2 = h('table');
  const trh2 = h('tr'); trh2.appendChild(h('th',{},'Catégorie'));
  years.forEach(y=>trh2.appendChild(h('th',{},y)));
  tbl2.appendChild(h('thead',{},trh2));
  const tb2 = h('tbody');
  const cats = new Set(); years.forEach(y=>yearData(Number(y)).categories.forEach(c=>cats.add(c.name)));
  Array.from(cats).forEach(cat=>{
    const tr = h('tr');
    tr.appendChild(h('td',{style:'font-weight:500'}, cat));
    years.forEach(y=>{
      const c = yearData(Number(y)).categories.find(x=>x.name===cat);
      const v = c ? sum(c.actual) : 0;
      tr.appendChild(h('td',{class:'mono'}, v?fmtEUR(v):h('span',{class:'faint'},'—')));
    });
    tb2.appendChild(tr);
  });
  tbl2.appendChild(tb2); wrap2.appendChild(tbl2); card2.appendChild(wrap2);
  main.appendChild(card2);
}

/* -------- EXPORT / IMPORT -------- */
function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `mmf-${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importJSON(){ document.getElementById('fileImport').click(); }
document.getElementById('fileImport').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{ try{ state = JSON.parse(reader.result); saveState(); renderAll(); alert('Import réussi.'); }catch(err){ alert('Fichier invalide.'); } };
  reader.readAsText(file);
});
function exportCSV(){
  const y = state.currentYear; const d = yearData(y);
  const rows = [['Catégorie','Objectif', ...MONTHS, 'Total']];
  d.categories.forEach(c=> rows.push([c.name, c.objectif||0, ...c.actual.map(v=>v||0), sum(c.actual)]));
  const csv = rows.map(r=>r.map(x=>{ const s=String(x).replace(/"/g,'""'); return /[,;\n"]/.test(s)?`"${s}"`:s; }).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `depenses-${y}.csv`; a.click();
}

/* -------- BTNS -------- */
document.getElementById('btnTheme').addEventListener('click', ()=>{
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('mmf.theme', next);
});
document.getElementById('btnExport').addEventListener('click', exportJSON);
document.getElementById('btnImport').addEventListener('click', importJSON);
document.documentElement.setAttribute('data-theme', localStorage.getItem('mmf.theme') || 'light');

/* -------- RENDER -------- */
function renderAll(){
  renderNav(); renderYearSelect(); renderCrumb();
  switch(activeTab){
    case 'dashboard': renderDashboard(); break;
    case 'depenses':  renderDepenses(); break;
    case 'fixes':     renderFixes(); break;
    case 'invest':    renderInvest(); break;
    case 'patrimoine':renderPatrimoine(); break;
    case 'allocation':renderAllocation(); break;
    case 'cash':      renderCash(); break;
    case 'dettes':    renderDettes(); break;
    case 'objectifs': renderObjectifs(); break;
    case 'historique':renderHistorique(); break;
    case 'parametres':renderParametres(); break;
    default: renderDashboard();
  }
}
renderAll();
